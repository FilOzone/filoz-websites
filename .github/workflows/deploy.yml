name: Deploy
on:
  push:
    branches: [main]
    paths: ['sites/**']
  workflow_dispatch:
jobs:
  deploy:
    uses: FilOzone/filecoin-nova/.github/workflows/deploy-sites.yml@v0.7.9
    # build_env: FilBeam D1 credentials so filbeam-dashboard{,-cal} can run their
    # build-time getStaticPaths() D1 query. Empty on other sites — harmless.
    with:
      build_env: |
        CLOUDFLARE_D1_MAINNET=${{ secrets.CLOUDFLARE_D1_MAINNET }}
        CLOUDFLARE_D1_CALIBRATION=${{ secrets.CLOUDFLARE_D1_CALIBRATION }}
        CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_FILBEAM_ACCOUNT_ID }}
        CLOUDFLARE_API_KEY=${{ secrets.CLOUDFLARE_FILBEAM_TOKEN }}
    # Cross-org call (FilOzone ↔ TippyFlitsUK): `inherit` silently drops
    # secrets, so each one must be explicit-mapped.
    secrets:
      NOVA_PIN_KEY:         ${{ secrets.NOVA_PIN_KEY }}
      NOVA_WALLET_ADDRESS:  ${{ secrets.NOVA_WALLET_ADDRESS }}
      NOVA_ENS_KEY:         ${{ secrets.NOVA_ENS_KEY }}
      NOVA_RPC_URL:         ${{ secrets.NOVA_RPC_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
